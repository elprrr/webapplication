# Despliegue en Render (https://render.com) — gratis con limitaciones
# 1. Sube el repo a GitHub
# 2. En Render: New > Blueprint y selecciona este archivo
#    O crea dos servicios manualmente según los comentarios abajo

services:
  - type: web
    name: bitewise-api
    runtime: node
    buildCommand: npm install
    startCommand: npx json-server server/db.json --routes server/routes.json --port $PORT --host 0.0.0.0
    envVars:
      - key: NODE_VERSION
        value: 22

  - type: web
    name: bitewise-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist/bitewise-recetas/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
