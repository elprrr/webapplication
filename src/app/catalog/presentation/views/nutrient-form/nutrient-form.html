<app-page-shell
  [title]="isEdit ? 'catalog.nutrients.edit' : 'catalog.nutrients.new'"
  subtitle="catalog.nutrients.subtitle"
  backRoute="/catalog/nutrients"
>
  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="catalog-form">
        <mat-form-field appearance="outline">
          <mat-label>{{ 'catalog.nutrients.calories' | translate }}</mat-label>
          <input matInput type="number" formControlName="calories" required />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ 'catalog.nutrients.carbs' | translate }}</mat-label>
          <input matInput type="number" formControlName="carbs" required />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ 'catalog.nutrients.proteins' | translate }}</mat-label>
          <input matInput type="number" formControlName="proteins" required />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ 'catalog.nutrients.fats' | translate }}</mat-label>
          <input matInput type="number" formControlName="fats" required />
        </mat-form-field>

        <div class="form-actions">
          <a mat-stroked-button routerLink="/catalog/nutrients">{{ 'common.cancel' | translate }}</a>
          <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
            {{ isEdit ? ('common.save' | translate) : ('common.create' | translate) }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</app-page-shell>
