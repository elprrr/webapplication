<app-page-shell
  [title]="isEdit ? 'catalog.categories.edit' : 'catalog.categories.new'"
  subtitle="catalog.categories.subtitle"
  backRoute="/catalog/categories"
>
  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="catalog-form">
        <mat-form-field appearance="outline">
          <mat-label>{{ 'common.name' | translate }}</mat-label>
          <input matInput formControlName="name" required />
          @if (form.get('name')?.touched && form.get('name')?.hasError('required')) {
            <mat-error>{{ 'common.name' | translate }} *</mat-error>
          }
        </mat-form-field>

        <div class="form-actions">
          <a mat-stroked-button routerLink="/catalog/categories">{{ 'common.cancel' | translate }}</a>
          <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
            {{ isEdit ? ('common.save' | translate) : ('common.create' | translate) }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</app-page-shell>
