<app-page-shell
  title="catalog.categories.title"
  subtitle="catalog.categories.subtitle"
  addRoute="/catalog/categories/new"
  addLabel="catalog.categories.add"
  [loading]="store.loading()"
  [error]="store.error()"
>
  <div class="data-card">
    @if (store.categories().length === 0 && !store.loading()) {
      <div class="empty-state">
        <mat-icon>category</mat-icon>
        <p>{{ 'common.empty' | translate }}</p>
      </div>
    } @else {
      <table mat-table [dataSource]="store.categories()">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>{{ 'common.id' | translate }}</th>
          <td mat-cell *matCellDef="let category">{{ category.id }}</td>
        </ng-container>
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>{{ 'common.name' | translate }}</th>
          <td mat-cell *matCellDef="let category">{{ category.name }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>{{ 'common.actions' | translate }}</th>
          <td mat-cell *matCellDef="let category">
            <div class="table-actions">
              <button mat-icon-button color="primary" (click)="editCategory(category.id)" [attr.aria-label]="'common.edit' | translate">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteCategory(category.id)" [attr.aria-label]="'common.delete' | translate">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    }
  </div>
</app-page-shell>
